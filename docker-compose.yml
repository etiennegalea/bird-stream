services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_NODE_ENV=${VITE_NODE_ENV:-production}
        - VITE_OPENRELAY_TURN_USERNAME=${VITE_OPENRELAY_TURN_USERNAME}
        - VITE_OPENRELAY_TURN_CREDENTIAL=${VITE_OPENRELAY_TURN_CREDENTIAL}
    container_name: stream-frontend
    ports:
      - "8050:80"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    container_name: stream-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8051:8051/tcp"
      - "8051:8051/udp"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=birb_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  coturn:
    build: ./coturn
    container_name: coturn
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf
      - ./coturn/certs:/etc/coturn/certs
    environment:
      - DETECT_EXTERNAL_IP=yes
      - DETECT_RELAY_IP=yes
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "turnutils_stunclient", "localhost", "3478" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
